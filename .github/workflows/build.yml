name: Build EREBUS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (MSVC)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package
          $exe = Get-ChildItem -Recurse -Path build -Filter "erebus.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName package/
          } else {
            Write-Error "erebus.exe not found in build directory"
            Get-ChildItem -Recurse -Path build -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          if (Test-Path assets) {
            Copy-Item -Recurse assets package/assets
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: erebus-windows
          path: package/
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: erebus-windows
          path: erebus-windows/

      - name: Zip release
        run: cd erebus-windows && zip -r ../erebus-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: erebus-${{ github.ref_name }}.zip
          generate_release_notes: true
